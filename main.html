<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RKFit Nonstopes – Daily Workout Notifier</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <!-- External CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<header>
  <div class="logo">RKFit<span> Nonstopes</span></div>
  <div class="status-dot">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">Notifications off</span>
  </div>
</header>

<main>
  <div class="hero">
    <h1>NEVER SKIP<br><em>A WORKOUT</em></h1>
    <p>Schedule smart push notifications for your daily training sessions.</p>
  </div>

  <div id="permBanner">
    <div class="perm-text">
      <strong>🔔 Enable notifications to get started</strong>
      <span>Allow FitPulse to send reminders.</span>
    </div>
    <button class="btn-enable" onclick="requestPermission()">Enable Now</button>
  </div>

  <div class="card">
    <div class="card-title">⚡ Schedule a Reminder</div>

    <input type="text" id="notifTitle" placeholder="Reminder Name"/>
    <input type="time" id="notifTime" value="07:00"/>
    <input type="text" id="notifBody" placeholder="Message"/>

    <button class="btn-schedule" onclick="addSchedule()">ADD REMINDER</button>
    <button class="btn-test" onclick="sendTestNotification()">Test Notification</button>
  </div>

  <div class="card">
    <div class="card-title">📋 Your Reminders</div>
    <div id="scheduleList"></div>
  </div>
</main>

<div id="toast"></div>

<!-- External JS -->
<script src="script.js"></script>
</body>
</html>
